image: node:22-alpine

stages:
  - test
  - build

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

test:
  stage: test
  script:
    - npm ci --ignore-scripts
    - npm run typecheck
    - node --test tests/*.test.mjs

build:
  stage: build
  script:
    - npm ci --ignore-scripts
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - dist/
      - server/
      - package.json
